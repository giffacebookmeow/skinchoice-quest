const FLOW=['welcome','demo','reference','r1','r2','r3','r4','validation','results'];

function computeParams(){
  const dPG=Math.max(0.01,350-sliders.r1),dQG=Math.max(0.01,sliders.r2-4);
  const dPL=Math.max(0.01,sliders.r3-350),dQL=Math.max(0.01,4-sliders.r4);
  const aB=dPG/dQG,lP=dPL/dPG,lQ=dQL/dQG;
  return{
    dPG:dPG.toFixed(0),dQG:dQG.toFixed(1),dPL:dPL.toFixed(0),dQL:dQL.toFixed(1),
    alphaBeta:aB.toFixed(2),lambdaP:lP.toFixed(2),lambdaQ:lQ.toFixed(2),
    predicted:(151-aB*lQ)>0?'B':'A',
    score:(151-aB*lQ).toFixed(1),
  };
}

function nextStep(){const i=FLOW.indexOf(step);if(i<FLOW.length-1){step=FLOW[i+1];render();}}

function progHTML(){
  const rk=['r1','r2','r3','r4'],cur=rk.indexOf(step);
  return'<div class="prog">'+rk.map((k,i)=>{
    let c='prog-seg';
    if(i<cur)c+=' prog-done';else if(i===cur)c+=' prog-cur';
    return`<div class="${c}"></div>`;
  }).join('')+'</div>';
}

/* ── Save via GET request (reliable with no-cors) ── */
async function saveToSheets(payload) {
  if (SHEETS_URL === 'YOUR_SCRIPT_URL_HERE') {
    console.warn('Google Sheets URL not set — skipping save');
    return 'no-url';
  }
  try {
    const params = new URLSearchParams(payload);
    await fetch(SHEETS_URL + '?' + params.toString(), {
      method: 'GET',
      mode: 'no-cors'
    });
    return 'ok';
  } catch(e) {
    console.error('Save error:', e);
    return 'error';
  }
}

    <div style="display:flex;justify-content:center;margin-bottom:16px">${charHTML()}</div>
    <div class="bfont" style="font-size:14px;color:#c8dff0;line-height:1.7;margin-bottom:14px">
      ยินดีต้อนรับสู่เกมช็อปปิ้งเพื่อการวิจัยพฤติกรรมผู้บริโภค<br><br>
      ใช้เวลาประมาณ 10 นาที ไม่มีคำตอบถูกหรือผิด
    </div>
    <div class="bfont" style="font-size:12px;color:#5a6a8a;line-height:1.8;margin-bottom:8px">
      โดยนายธนัช เจตะวัฒนะ<br>คณะเศรษฐศาสตร์ จุฬาลงกรณ์มหาวิทยาลัย
    </div>
    <button class="btn" id="s0">► เริ่มเกม!</button>`;
  document.getElementById('s0').onclick=nextStep;
}

function renderDemo(){
  document.getElementById('screen').innerHTML=`
    <div class="title gfont">ข้อมูลเบื้องต้น</div>
    <label class="lbl-form">เพศ</label>
    <select id="g"><option value="">-- กรุณาเลือก --</option><option>ชาย</option><option>หญิง</option><option>ไม่ระบุ</option></select>
    <label class="lbl-form">อายุ</label>
    <select id="a"><option value="">-- กรุณาเลือก --</option><option>ต่ำกว่า 20 ปี</option><option>20-25 ปี</option><option>26-35 ปี</option><option>36 ปีขึ้นไป</option></select>
    <label class="lbl-form">ความถี่ซื้อผลิตภัณฑ์บำรุงผิว</label>
    <select id="f"><option value="">-- กรุณาเลือก --</option><option>แทบไม่ซื้อเลย</option><option>บางครั้ง</option><option>บ่อยครั้ง</option><option>ซื้อเป็นประจำ</option></select>
    <button class="btn" id="db" disabled>ถัดไป →</button>`;
  if(demo.gender)document.getElementById('g').value=demo.gender;
  if(demo.age)document.getElementById('a').value=demo.age;
  if(demo.freq)document.getElementById('f').value=demo.freq;
  function chk(){
    demo.gender=document.getElementById('g').value;
    demo.age=document.getElementById('a').value;
    demo.freq=document.getElementById('f').value;
    document.getElementById('db').disabled=!(demo.gender&&demo.age&&demo.freq);
  }
  ['g','a','f'].forEach(id=>document.getElementById(id).onchange=chk);
  document.getElementById('db').onclick=nextStep;chk();
}

function renderReference(){
  document.getElementById('screen').innerHTML=`
    <div class="title gfont">ยี่ห้อ A ของโปรดคุณ</div>
    <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:14px">
      <div>${bubbleHTML('นี่คือของโปรด\nที่ฉันใช้เสมอ\nและชื่นชอบมาก!')}${charHTML()}</div>
      ${pcardHTML('ยี่ห้อ A',350,4,'normal',true)}
    </div>
    <div class="bfont" style="font-size:14px;color:#c8dff0;line-height:1.8;margin-bottom:14px">
      ยี่ห้อ A คือสินค้าที่คุณซื้อและใช้เป็นประจำมาตลอด<br>
      ราคาปกติ <strong style="color:#ffd700">350 บาท</strong>
      คุณภาพ <strong style="color:#ffd700">4.0 ดาว</strong> และคุณพอใจกับมัน<br><br>
      ในแต่ละรอบ คุณจะต้องหาจุดที่ทำให้คุณรู้สึกว่า<br>
      <strong style="color:#ffd700">"เลือกอะไรก็ได้เหมือนกัน"</strong>
    </div>
    <button class="btn" style="background:#2a7f4f;border-color:#145a32;color:#a8ffce" id="rb">► เข้าใจแล้ว เริ่มเลย!</button>`;
  document.getElementById('rb').onclick=nextStep;
}

function renderRound(key){
  const rd=ROUNDS[key],val=sliders[key];
  const badgeCls=rd.badge==='gain'?'badge-gain':'badge-loss';
  const diffCls=rd.isWarn?'diff-box diff-warn':'diff-box';
  document.getElementById('screen').innerHTML=`
    ${progHTML()}
    <div style="margin-bottom:6px"><span class="${badgeCls}">${rd.badgeText}</span></div>
    <div class="round-label">${rd.label}</div>
    <div class="title gfont">${rd.title}</div>
    ${favReminderHTML()}
    ${shelfHTML(rd.aP(val),rd.aQ(val),rd.bLbl,rd.bP(val),rd.bQ(val),rd.think,rd.aStyle,rd.bStyle)}
    <div class="${diffCls}" id="dt">${rd.diff(val)}</div>
    <div class="desc-txt">${rd.desc}</div>
    <span class="slider-label gfont" id="sl">${rd.sLabel(val)}</span>
    <input type="range" ${rd.isWarn?'class="warn"':''} id="ms" min="${rd.min}" max="${rd.max}" step="${rd.step}" value="${val}">
    <div class="range-labels"><span>${rd.min} ${rd.unit}</span><span>${rd.max} ${rd.unit}</span></div>
    <button class="btn" id="nb">บันทึก → รอบถัดไป</button>`;
  document.getElementById('ms').oninput=()=>{
    const v=parseFloat(document.getElementById('ms').value);
    sliders[key]=v;
    document.getElementById('dt').textContent=rd.diff(v);
    document.getElementById('sl').textContent=rd.sLabel(v);
    rd.onUpdate(v);
  };
  document.getElementById('nb').onclick=nextStep;
}

function renderValidation(){
  document.getElementById('screen').innerHTML=`
    <div class="title gfont">รอบสุดท้าย!</div>
    ${favReminderHTML()}
    ${shelfHTML(350,4,'ยี่ห้อ B',199,3,
      'A ของโปรด\n350บาท 4ดาว\nvs B 199บาท\n3ดาว...\nจะเลือกอะไร?',
      'normal','highlight')}
    <div class="desc-txt">
      <strong>ยี่ห้อ A ของโปรด:</strong> 350 บาท / 4.0 ดาว<br>
      <strong>ยี่ห้อ B:</strong> 199 บาท / 3.0 ดาว<br><br>
      B ถูกกว่า <strong style="color:#ffd700">151 บาท</strong> (ΔP = +151)<br>
      แต่คุณภาพต่ำกว่า <strong style="color:#ff9999">1 ดาว</strong> (ΔQ = −1)<br><br>
      คุณจะเลือกอะไร?
    </div>
    <div class="btn-row">
      <button class="btn" id="ca" style="background:${choice==='A'?'#2a7f4f':'#1a2a3a'};border-color:${choice==='A'?'#145a32':'#3a4f6a'};color:${choice==='A'?'#a8ffce':'#a8c8e8'}">${choice==='A'?'✓ ':''}A ของโปรด</button>
      <button class="btn" id="cb" style="background:${choice==='B'?'#2a7f4f':'#1a2a3a'};border-color:${choice==='B'?'#145a32':'#3a4f6a'};color:${choice==='B'?'#a8ffce':'#a8c8e8'}">${choice==='B'?'✓ ':''}ยี่ห้อ B</button>
    </div>
    <button class="btn" id="sb" ${!choice?'disabled':''} style="background:#2a7f4f;border-color:#145a32;color:#a8ffce;margin-top:12px">► ส่งคำตอบทั้งหมด</button>`;
  document.getElementById('ca').onclick=()=>{choice='A';renderValidation();};
  document.getElementById('cb').onclick=()=>{choice='B';renderValidation();};
  document.getElementById('sb').onclick=async()=>{
    const btn=document.getElementById('sb');
    btn.textContent='กำลังบันทึก...';
    btn.disabled=true;
    const p=computeParams();
    const payload={
      timestamp:new Date().toISOString(),
      gender:demo.gender,age:demo.age,freq:demo.freq,
      priceGainThreshold:p.dPG,qualityGainThreshold:p.dQG,
      priceLossThreshold:p.dPL,qualityLossThreshold:p.dQL,
      validationChoice:choice,modelPrediction:p.predicted,
      predictionMatch:(p.predicted===choice)?'yes':'no',
      alphaBeta:p.alphaBeta,lambdaP:p.lambdaP,lambdaQ:p.lambdaQ
    };
    const status=await saveToSheets(payload);
    nextStep();
  };
}

function renderResults(){
  const p=computeParams();
  const lP=parseFloat(p.lambdaP),lQ=parseFloat(p.lambdaQ);
  const match=p.predicted===choice;
  document.getElementById('screen').innerHTML=`
    <div style="text-align:center;margin-bottom:14px">
      <div class="gfont" style="font-size:13px;color:#2a7f4f;text-shadow:2px 2px 0 #145a32;margin-bottom:10px">GAME CLEAR!</div>
      <div style="display:flex;justify-content:center">${charHTML()}</div>
    </div>
    <div class="title gfont">ขอบคุณมาก!</div>
    <div class="save-status save-ok bfont">✓ คำตอบของคุณถูกบันทึกเรียบร้อยแล้ว</div>
    <div style="background:#0f0e1a;border:2px solid #ffd700;padding:14px;margin-top:10px;margin-bottom:10px">
      <div class="gfont" style="font-size:9px;color:#ffd700;margin-bottom:10px">จุดสลับที่คุณพบ</div>
      ${[['ΔP* — B ถูกกว่าเท่าไหร่',p.dPG+' บาท'],['ΔQ_gain — B ดีกว่าเท่าไหร่',p.dQG+' ดาว'],['ΔP_loss — A แพงขึ้นเท่าไหร่',p.dPL+' บาท'],['ΔQ* — A แย่ลงเท่าไหร่',p.dQL+' ดาว']].map(([l,v])=>`<div class="result-row"><span>${l}</span><span class="result-val">${v}</span></div>`).join('')}
      <div class="gfont" style="font-size:8px;color:#5a6a8a;margin:10px 0 6px">พารามิเตอร์ (θ = 1, linear)</div>
      ${[['α/β — น้ำหนักคุณภาพ/ราคา',p.alphaBeta],['λP — price loss aversion',p.lambdaP],['λQ — quality loss aversion',p.lambdaQ]].map(([l,v])=>`<div class="result-row"><span>${l}</span><span class="result-val">${v}</span></div>`).join('')}
      <div style="margin-top:10px">
        <span class="tag ${lP>1?'tag-yes':'tag-no'}">λP ${lP>1?'> 1 ✓':'≤ 1'}</span>
        <span class="tag ${lQ>1?'tag-yes':'tag-no'}" style="margin-left:6px">λQ ${lQ>1?'> 1 ✓':'≤ 1'}</span>
      </div>
    </div>
    <div class="${match?'val-box val-match':'val-box val-miss'}">
      <div class="gfont" style="font-size:9px;color:${match?'#a8ffce':'#ffaaaa'};margin-bottom:8px">การทำนายรอบสุดท้าย</div>
      <div class="bfont" style="font-size:13px;color:#c8dff0;line-height:1.8">
        โมเดลทำนาย: <strong style="color:#ffd700">ยี่ห้อ ${p.predicted}</strong><br>
        คุณเลือก: <strong style="color:#ffd700">ยี่ห้อ ${choice}</strong><br>
        ผล: <strong style="color:${match?'#a8ffce':'#ff9999'}">${match?'✓ ถูกต้อง':'✗ ไม่ตรงกัน'}</strong>
      </div>
      <div class="bfont" style="font-size:12px;color:#5a6a8a;margin-top:8px;line-height:1.7">
        สูตร: เลือก B ถ้า 151 > (α/β × λQ)<br>
        = 151 > (${p.alphaBeta} × ${p.lambdaQ}) = 151 > ${(parseFloat(p.alphaBeta)*parseFloat(p.lambdaQ)).toFixed(1)}<br>
        → ${parseFloat(p.score)>0?'151 > ค่า ∴ เลือก B':'151 < ค่า ∴ เลือก A'}
      </div>
    </div>
    <div class="bfont" style="font-size:12px;color:#5a6a8a;line-height:1.8;text-align:center;margin-top:10px">
      โดยนายธนัช เจตะวัฒนะ<br>คณะเศรษฐศาสตร์ จุฬาลงกรณ์มหาวิทยาลัย
    </div>`;
}

function render(){
  switch(step){
    case 'welcome':renderWelcome();break;
    case 'demo':renderDemo();break;
    case 'reference':renderReference();break;
    case 'r1':case 'r2':case 'r3':case 'r4':renderRound(step);break;
    case 'validation':renderValidation();break;
    case 'results':renderResults();break;
  }
}
render();
</script>
</body>
</html>
